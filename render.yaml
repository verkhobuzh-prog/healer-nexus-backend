# Render Blueprint: Healer Nexus backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    runtime: python
    name: healer-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healer-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production

databases:
  - name: healer-db
    plan: free
