version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: backend-db-1
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: backend-redis-1
    restart: always

  admin-agent:
    build: .
    container_name: backend-admin-agent-1
    # Запускаємо модуль admin_agent
    command: python3 -m admin_agent.main
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - TELEGRAM_BOT_TOKEN=8406415084:AAHQD_LblrHxfQE531x5G23WO1QPvYhBX2M
      - ADMIN_CHAT_ID=450839780
      - GOOGLE_API_KEY=AIzaSyBj0LnJ9o2kzi4ZQABrraYvCi0Fb5aqBdE
    restart: always

  web-api:
    build: .
    container_name: backend-web-api-1
    # Запускаємо FastAPI/Uvicorn
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres

volumes:
  postgres_data:
