<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — Healer Nexus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card h1 { text-align: center; margin-bottom: 8px; color: #333; }
        .card p { text-align: center; color: #888; margin-bottom: 24px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group textarea { resize: vertical; height: 80px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn:hover { opacity: 0.9; }
        .error { color: #e74c3c; text-align: center; margin-top: 12px; display: none; }
        .success { color: #27ae60; text-align: center; margin-top: 12px; display: none; }
        .login-link { text-align: center; margin-top: 16px; color: #888; }
        .login-link a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Healer Nexus</h1>
        <p>Створіть акаунт спеціаліста</p>
        <div class="form-group">
            <label>Ваше ім'я *</label>
            <input type="text" id="name" placeholder="Олена Петренко">
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Пароль * (мінімум 8 символів)</label>
            <input type="password" id="password" placeholder="Надійний пароль">
        </div>
        <div class="form-group">
            <label>Спеціальність *</label>
            <input type="text" id="specialty" placeholder="Психолог, Вчитель, Дизайнер...">
        </div>
        <div class="form-group">
            <label>Про себе</label>
            <textarea id="bio" placeholder="Розкажіть про свій досвід..."></textarea>
        </div>
        <div class="form-group">
            <label>Telegram username (без @)</label>
            <input type="text" id="telegram" placeholder="your_username">
        </div>
        <button class="btn" onclick="register()">Зареєструватись</button>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <div class="login-link">
            Вже є акаунт? <a href="/login">Увійти</a>
        </div>
    </div>
    <script>
        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const specialty = document.getElementById('specialty').value;
            const bio = document.getElementById('bio').value;
            const telegram = document.getElementById('telegram').value;
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!name || !email || !password || !specialty) {
                errorEl.textContent = "Заповніть обов'язкові поля (*)";
                errorEl.style.display = 'block';
                return;
            }

            try {
                // 1. Register user
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name, role: 'practitioner' })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.detail || 'Помилка реєстрації';
                    errorEl.style.display = 'block';
                    return;
                }

                const token = data.access_token;
                localStorage.setItem('access_token', token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // 2. Update specialist info
                if (data.user.specialist_id) {
                    await fetch(`/api/specialists/${data.user.specialist_id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ name, specialty, bio: bio || name })
                    });
                }

                // 3. Set social links if telegram provided
                if (telegram) {
                    await fetch('/api/profile/social-links', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ telegram: telegram.replace('@', '') })
                    });
                }

                successEl.textContent = 'Реєстрація успішна! Переходимо в панель...';
                successEl.style.display = 'block';
                setTimeout(() => { window.location.href = '/dashboard'; }, 1500);

            } catch (e) {
                errorEl.textContent = 'Помилка з\'єднання';
                errorEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
