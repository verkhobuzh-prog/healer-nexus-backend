<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Healer Nexus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; width: 400px; max-width: 90vw; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card h1 { text-align: center; margin-bottom: 8px; color: #2c3e50; }
        .card p.subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn-primary { background: #667eea; color: white; }
        .btn:hover { opacity: 0.85; }
        .toggle { text-align: center; margin-top: 16px; font-size: 14px; color: #888; }
        .toggle a { color: #667eea; cursor: pointer; text-decoration: none; font-weight: 600; }
        .alert { padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .alert-success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="form-title">Вхід</h1>
        <p class="subtitle">Healer Nexus Platform</p>
        <div class="alert alert-error" id="error-msg"></div>
        <div class="alert alert-success" id="success-msg"></div>
        <div class="form-group" id="name-group" style="display:none;">
            <label>Ім'я</label>
            <input type="text" id="name" placeholder="Ваше ім'я">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="Ваш пароль">
        </div>
        <button class="btn btn-primary" id="submit-btn" onclick="submitForm()">Увійти</button>
        <div class="toggle">
            <span id="toggle-text">Немає акаунту?</span> <a onclick="toggleMode()" id="toggle-link">Зареєструватися</a>
        </div>
    </div>
    <script>
        let isRegister = false;

        function toggleMode() {
            isRegister = !isRegister;
            document.getElementById('form-title').textContent = isRegister ? 'Реєстрація' : 'Вхід';
            document.getElementById('submit-btn').textContent = isRegister ? 'Зареєструватися' : 'Увійти';
            document.getElementById('name-group').style.display = isRegister ? 'block' : 'none';
            document.getElementById('toggle-text').textContent = isRegister ? 'Вже є акаунт?' : 'Немає акаунту?';
            document.getElementById('toggle-link').textContent = isRegister ? 'Увійти' : 'Зареєструватися';
            hideAlerts();
        }

        function hideAlerts() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        async function submitForm() {
            hideAlerts();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('Заповніть email і пароль'); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Зачекайте...';

            try {
                let url, body;
                if (isRegister) {
                    const name = document.getElementById('name').value.trim();
                    if (!name) { showError('Введіть ім\'я'); btn.disabled = false; btn.textContent = 'Зареєструватися'; return; }
                    url = '/api/auth/register';
                    body = JSON.stringify({ email, password, name, role: 'user' });
                } else {
                    url = '/api/auth/login';
                    body = JSON.stringify({ email, password });
                }

                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.detail || 'Помилка');
                    btn.disabled = false;
                    btn.textContent = isRegister ? 'Зареєструватися' : 'Увійти';
                    return;
                }

                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                const role = data.user.role;
                if (role === 'admin') window.location.href = '/admin-dashboard';
                else if (role === 'practitioner') window.location.href = '/specialist-dashboard';
                else window.location.href = '/';
            } catch (e) {
                showError('Помилка з\'єднання');
                btn.disabled = false;
                btn.textContent = isRegister ? 'Зареєструватися' : 'Увійти';
            }
        }

        document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') submitForm(); });
    </script>
</body>
</html>
