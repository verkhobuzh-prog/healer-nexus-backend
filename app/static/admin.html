<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITER PRO v3.0 - NASA Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-8 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 drop-shadow-[0_0_15px_rgba(34,211,238,0.4)]">
            ORBITER PRO <span class="text-sm font-mono tracking-widest uppercase opacity-50">Deep Space Registry</span>
        </h1>

        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden backdrop-blur-md">
            <table class="w-full text-left">
                <thead class="bg-slate-800/40">
                    <tr>
                        <th class="p-4 text-cyan-500 text-xs uppercase tracking-widest font-bold">Об'єкт / Оператор</th>
                        <th class="p-4 text-cyan-500 text-xs uppercase tracking-widest font-bold">Локація / Зв'язок</th>
                        <th class="p-4 text-cyan-500 text-xs uppercase tracking-widest font-bold text-center">Рейтинг</th>
                        <th class="p-4 text-cyan-500 text-xs uppercase tracking-widest font-bold text-right">Дії</th>
                    </tr>
                </thead>
                <tbody id="healersTable" class="divide-y divide-slate-800/50"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function loadHealers() {
            const response = await fetch(`${API_URL}/healers`);
            const healers = await response.json();
            const table = document.getElementById('healersTable');
            table.innerHTML = '';

            healers.forEach(h => {
                // Випадкова аватарка для краси, якщо в базі немає своєї
                const avatar = h.avatar_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${h.name}`;
                
                table.innerHTML += `
                    <tr class="hover:bg-slate-800/30 transition-all group">
                        <td class="p-4 flex items-center gap-4">
                            <img src="${avatar}" class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 shadow-inner" alt="Avatar">
                            <div>
                                <div class="font-bold text-white group-hover:text-cyan-400 transition">${h.name}</div>
                                <div class="text-[10px] font-mono text-slate-500 uppercase">${h.specialty}</div>
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="text-cyan-400 text-sm font-medium">${h.phone || 'NO SIGNAL'}</div>
                            <div class="text-[10px] text-slate-400 italic">${h.city || 'Deep Space'}</div>
                        </td>
                        <td class="p-4 text-center">
                            <span class="bg-cyan-500/10 text-cyan-400 px-2 py-1 rounded text-xs border border-cyan-500/20 font-bold">
                                ⭐ ${h.rating || 5}.0
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="deleteHealer(${h.id})" class="text-slate-600 hover:text-red-500 transition-colors text-xs font-bold uppercase tracking-widest">
                                Термінувати
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deleteHealer(id) {
            if(confirm('Видалити цей об\'єкт з реєстру?')) {
                await fetch(`${API_URL}/healers/${id}`, {method: 'DELETE'});
                loadHealers();
            }
        }
        loadHealers();
    </script>
</body>
</html>
