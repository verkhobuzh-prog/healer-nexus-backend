<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healer Nexus - Чат</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #2c3e50; color: white; padding: 1rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background: #3498db; color: white; border-bottom-right-radius: 2px; }
        .assistant { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .role-tag { font-size: 0.7rem; color: #95a5a6; margin-bottom: 4px; display: block; }
        
        #input-area { background: white; padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { background: #27ae60; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        .typing { font-style: italic; color: #7f8c8d; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

<header>
    <h1>Healer Nexus AI</h1>
</header>

<div id="chat-container">
    <div class="message assistant">
        Привіт! Я твій асистент Healer Nexus. Напиши мені, і я підберу потрібного спеціаліста або допоможу порадою.
    </div>
</div>

<div id="input-area">
    <div id="typing-indicator" class="typing">ШІ думає...</div>
    <input type="text" id="user-input" placeholder="Введіть ваше запитання...">
    <button onclick="sendMessage()">Надіслати</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');

    // ID користувача для тестів (потім можна брати з авторизації)
    const USER_ID = 12345;

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Додаємо повідомлення користувача в чат
        appendMessage('user', text);
        userInput.value = '';
        typingIndicator.style.display = 'block';

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, user_id: USER_ID })
            });

            const data = await response.json();
            
            if (data.response) {
                appendMessage('assistant', data.response, data.detected_role);
            } else {
                appendMessage('assistant', "Вибачте, сталася помилка.");
            }
        } catch (error) {
            appendMessage('assistant', "Помилка зв'язку з сервером.");
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    function appendMessage(role, text, detectedRole = '') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        let html = '';
        if (detectedRole) {
            html += `<span class="role-tag">Відповідає: ${detectedRole}</span>`;
        }
        html += `<div>${text}</div>`;
        
        msgDiv.innerHTML = html;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Відправка по Enter
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
