<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healer Nexus | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <nav class="bg-white shadow-sm border-b px-8 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-indigo-600">🌟 Healer Nexus Admin</h1>
        <div id="overallStatus" class="flex items-center gap-2 px-4 py-2 rounded-full bg-gray-100 text-sm font-bold">
            <span class="w-3 h-3 rounded-full bg-gray-400"></span>
            Завантаження...
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm mb-1 font-medium uppercase">Всього спеціалістів</p>
                <h2 id="totalSpecs" class="text-4xl font-black text-gray-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm mb-1 font-medium uppercase">Активні модулі</p>
                <h2 id="activeModules" class="text-4xl font-black text-green-500">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm mb-1 font-medium uppercase">Попит (7 днів)</p>
                <h2 id="totalDemand" class="text-4xl font-black text-orange-500">0</h2>
            </div>
        </div>

        <h3 class="text-xl font-bold mb-4 text-gray-700">Стан модулів</h3>
        <div id="modulesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
            </div>
    </main>

    <script>
        async function updateDashboard() {
            try {
                // Отримуємо Health
                const hRes = await fetch('/api/health');
                const health = await hRes.json();
                
                // Отримуємо Аналітику
                const aRes = await fetch('/api/analytics');
                const analytics = await aRes.json();

                // Оновлюємо статус
                const statusEl = document.getElementById('overallStatus');
                const dot = statusEl.querySelector('span');
                statusEl.className = `flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold ${health.overall === 'healthy' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
                dot.className = `w-3 h-3 rounded-full status-pulse ${health.overall === 'healthy' ? 'bg-green-500' : 'bg-red-500'}`;
                statusEl.childNodes[1].textContent = health.overall.toUpperCase();

                // Оновлюємо цифри
                document.getElementById('totalSpecs').textContent = health.modules.specialists?.total_specialists || 0;
                document.getElementById('activeModules').textContent = health.summary.healthy;
                
                let demandSum = 0;
                if (analytics.demand) {
                    Object.values(analytics.demand).forEach(v => demandSum += v);
                }
                document.getElementById('totalDemand').textContent = demandSum;

                // Малюємо модулі
                const container = document.getElementById('modulesContainer');
                container.innerHTML = '';
                Object.entries(health.modules).forEach(([name, data]) => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-gray-800 capitalize">${name}</h4>
                                <p class="text-xs text-gray-400">Останній чек: ${new Date(data.timestamp).toLocaleTimeString()}</p>
                            </div>
                            <span class="px-3 py-1 rounded-lg text-xs font-bold ${data.status === 'healthy' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}">
                                ${data.status}
                            </span>
                        </div>
                    `;
                });

            } catch (e) { console.error('Dashboard error:', e); }
        }

        setInterval(updateDashboard, 900000);
        updateDashboard();
    </script>
</body>
</html>
