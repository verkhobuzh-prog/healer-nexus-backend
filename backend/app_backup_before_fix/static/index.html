<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healer Nexus - AI Платформа</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables для динамічних тем */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --bg-secondary: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --accent: #8b5cf6;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
            --font-main: 'Space Grotesk', sans-serif;
        }
        
        /* Smooth transitions для зміни тем */
        * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        
        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
        }
        
        /* Теми для різних сервісів */
        .theme-healer {
            --primary: #6d28d9;
            --primary-dark: #5b21b6;
            --bg: #f3e8ff;
            --bg-secondary: #faf5ff;
            --text: #4c1d95;
            --text-secondary: #7c3aed;
            --accent: #d8b4fe;
            --border: #e9d5ff;
            --shadow: rgba(109, 40, 217, 0.15);
            --font-main: 'Space Grotesk', sans-serif;
        }
        
        .theme-energy_practice {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg: #faf5ff;
            --bg-secondary: #f5f3ff;
            --text: #5b21b6;
            --text-secondary: #8b5cf6;
            --accent: #c4b5fd;
            --border: #ddd6fe;
            --shadow: rgba(139, 92, 246, 0.15);
            --font-main: 'Space Grotesk', sans-serif;
        }
        
        .theme-coach {
            --primary: #d97706;
            --primary-dark: #b45309;
            --bg: #fef3c7;
            --bg-secondary: #fffbeb;
            --text: #78350f;
            --text-secondary: #d97706;
            --accent: #fbbf24;
            --border: #fde68a;
            --shadow: rgba(217, 119, 6, 0.15);
            --font-main: 'Manrope', sans-serif;
        }
        
        .theme-3d_modeling, .theme-interior_designer {
            --primary: #22d3ee;
            --primary-dark: #06b6d4;
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #00f0ff;
            --border: #334155;
            --shadow: rgba(34, 211, 238, 0.2);
            --font-main: 'JetBrains Mono', monospace;
        }
        
        .theme-web_development {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --text: #f0fdf4;
            --text-secondary: #86efac;
            --accent: #4ade80;
            --border: #166534;
            --shadow: rgba(16, 185, 129, 0.2);
            --font-main: 'JetBrains Mono', monospace;
        }
        
        .theme-teacher_math, .theme-teacher_ukrainian {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg: #eff6ff;
            --bg-secondary: #ffffff;
            --text: #1e3a8a;
            --text-secondary: #3b82f6;
            --accent: #93c5fd;
            --border: #bfdbfe;
            --shadow: rgba(59, 130, 246, 0.15);
            --font-main: 'Manrope', sans-serif;
        }
        
        /* Chat bubble animations */
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .message-user {
            animation: slideInLeft 0.3s ease;
        }
        
        .message-assistant {
            animation: slideInRight 0.3s ease;
        }
        
        /* Typing indicator */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            30% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* Specialist card hover */
        .specialist-card {
            transition: all 0.3s ease;
        }
        
        .specialist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px var(--shadow);
        }
        
        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <!-- Main Container -->
    <div id="app" class="w-full max-w-4xl">
        
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="text-center space-y-8 py-12">
            <div>
                <h1 class="text-5xl font-bold mb-4" style="color: var(--primary)">
                    🌟 Healer Nexus
                </h1>
                <p class="text-xl" style="color: var(--text-secondary)">
                    AI-платформа для цілителів, коучів, вчителів та креативних професіоналів
                </p>
            </div>
            
            <!-- Quick Start Categories -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-12">
                <button onclick="startChat('healer')" class="category-btn p-6 rounded-2xl border-2 hover:scale-105 transition-transform" style="background: var(--bg-secondary); border-color: var(--border)">
                    <div class="text-4xl mb-2">🧘</div>
                    <div class="font-semibold">Цілитель</div>
                </button>
                
                <button onclick="startChat('coach')" class="category-btn p-6 rounded-2xl border-2 hover:scale-105 transition-transform" style="background: var(--bg-secondary); border-color: var(--border)">
                    <div class="text-4xl mb-2">💎</div>
                    <div class="font-semibold">Коуч</div>
                </button>
                
                <button onclick="startChat('3d_modeling')" class="category-btn p-6 rounded-2xl border-2 hover:scale-105 transition-transform" style="background: var(--bg-secondary); border-color: var(--border)">
                    <div class="text-4xl mb-2">🎨</div>
                    <div class="font-semibold">3D / Дизайн</div>
                </button>
                
                <button onclick="startChat('web_development')" class="category-btn p-6 rounded-2xl border-2 hover:scale-105 transition-transform" style="background: var(--bg-secondary); border-color: var(--border)">
                    <div class="text-4xl mb-2">💻</div>
                    <div class="font-semibold">Веб-розробка</div>
                </button>
            </div>
            
            <button onclick="startChat('general')" class="mt-8 px-8 py-3 rounded-full font-semibold hover:opacity-90 transition-opacity" style="background: var(--primary); color: white;">
                Або просто почати чат →
            </button>
        </div>
        
        <!-- Chat Interface (hidden initially) -->
        <div id="chatInterface" class="hidden">
            
            <!-- Header -->
            <div class="flex items-center justify-between p-4 rounded-t-2xl" style="background: var(--bg-secondary); border-bottom: 2px solid var(--border)">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center text-2xl" style="background: var(--primary)">
                        🤖
                    </div>
                    <div>
                        <div class="font-semibold" style="color: var(--text)">AI Асистент</div>
                        <div class="text-sm" style="color: var(--text-secondary)" id="statusText">Онлайн</div>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="clearChat()" class="px-4 py-2 rounded-lg text-sm font-medium hover:opacity-80" style="background: var(--border); color: var(--text)">
                        Очистити чат
                    </button>
                    <button onclick="showWelcome()" class="px-4 py-2 rounded-lg text-sm font-medium hover:opacity-80" style="background: var(--border); color: var(--text)">
                        ← Назад
                    </button>
                </div>
            </div>
            
            <!-- Messages Container -->
            <div class="chat-messages h-[500px] overflow-y-auto p-6 space-y-4" style="background: var(--bg)" id="messagesContainer">
                <!-- Messages will be inserted here -->
            </div>
            
            <!-- Input Area -->
            <div class="p-4 rounded-b-2xl" style="background: var(--bg-secondary); border-top: 2px solid var(--border)">
                <form id="chatForm" class="flex gap-3">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Введіть повідомлення..." 
                        class="flex-1 px-4 py-3 rounded-xl border-2 outline-none focus:border-opacity-100"
                        style="background: var(--bg); border-color: var(--border); color: var(--text)"
                        autocomplete="off"
                    />
                    <button 
                        type="submit" 
                        class="px-6 py-3 rounded-xl font-semibold hover:opacity-90 transition-opacity"
                        style="background: var(--primary); color: white"
                    >
                        Надіслати
                    </button>
                </form>
            </div>
            
        </div>
        
    </div>
    
    <!-- JavaScript -->
    <script src="/static/js/script.js"></script>
</body>
</html>
